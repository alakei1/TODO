name: CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  code-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports order (isort)
        run: isort --check-only --profile black .

      - name: Check code formatting (black)
        run: black --check .

      - name: Lint for syntax errors (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-line-length=88 --statistics

      - name: Type checking (mypy)
        run: |
          if [ -n "$(find . -maxdepth 2 -name "*.py" -not -path "*/.*")" ]; then
            # Передаем конкретные папки вместо точки, чтобы mypy не падал
            mypy --explicit-package-bases --ignore-missing-imports app test
          else
            echo "Python-файлы не найдены. Пропуск проверки типов."
          fi

      - name: Execute Unittests
        run: python -m unittest discover -s . -p "test_*.py"


